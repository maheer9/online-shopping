

<html lang="en">

    <title>MEN FASHION</title>


<style>
    body {
        font-family: Arial, sans-serif;

}
        
    

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }


    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }

    .card {
        background: lavender;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 2px 8px hotpink;
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
    }

    .card h3 {
        font-size: 16px;
        margin: 10px 0 5px;
    }

    .card p {
        color: brown;
        font-weight: bold;
    }

    button {
        margin-top: 8px;
        padding: 6px 12px;
        border: none;
        background: lawngreen;
        color: darkolivegreen;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: lavender;
    }
</style>


</head>

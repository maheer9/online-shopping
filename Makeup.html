

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> KIDS-FASHION</title>


<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
         background: url('1.jpg') no-repeat center center/cover;
}
        
    

    h1 {
        text-align: center;
        margin-bottom: 20px;
    }


    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
    }

    .card {
        background: lavender;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 2px 8px hotpink;
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    .card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
    }

    .card h3 {
        font-size: 16px;
        margin: 10px 0 5px;
    }

    .card p {
        color: brown;
        font-weight: bold;
    }

    button {
        margin-top: 8px;
        padding: 6px 12px;
        border: none;
        background: lawngreen;
        color: darkolivegreen;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: lavender;
    }
</style>


</head>

<body>

<h1>💄 MAKEUP PRODUCTS</h1>

<div class="products">


<div class="card">
    <img src="l.jpg" alt="LIPSTICKS">
    <h3>LIPSTICKS</h3>
    <p>₹599</p>
    <button>CLICK TO BUY</button>
</div>

<div class="card">
    <img src="fc.jpg" alt="FACE-MAKEUP">
    <h3>FACE-MAKEUP</h3>
    <p>₹499</p>
    <button>CLICK TO BUY</button>
</div>

<div class="card">
    <img src="np.jpg" alt="NAIL-PAINT">
    <h3>NAIL-PAINT</h3>
    <p>₹400</p>
    <button>CLICK TO BUY</button>
</div>

<div class="card">
    <img src="bc.jpg" alt="PERFUME">
    <h3>PERFUME</h3>
    <p>₹599</p>
    <button>CLICK TO BY</button>

</div>
<div class="card">
    <img src="bd.jpg" alt="BODY-LOTION">
    <h3>BODY-LOTION</h3>
    <p>₹159</p>
    <button>CLICK TO BUY</button>
</div>
<div class="card">
    <img src="hair.jpg" alt="HAIR-CURLERS">
    <h3>HAIR-CURLERS</h3>
    <p>₹699</p>
    <button>CLICK TO BUY</button>
</div>



</body>
</html>
